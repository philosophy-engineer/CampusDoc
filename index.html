<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TXT Viewer</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #34353a;
        --text: #d7d8dc;
        --muted: #afb1b8;
        --line: #4a4c54;
        --btn-bg: #3d4048;
        --btn-bg-hover: #4a4d56;
        --surface: #34353a;
        --surface-soft: #34353a;
        --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        --reader-stage-bg: transparent;
        --paper-bg: #53545a;
        --paper-text: #d8d9dd;
        --paper-muted: #babcc2;
        --paper-line: #666872;
        --underline-color: #1b1f27;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "SUIT Variable", "Pretendard Variable", "Noto Sans KR", -apple-system, sans-serif;
        transition: background-color 180ms ease, color 180ms ease;
      }

      body[data-theme="dark"] {
        --bg: #34353a;
        --text: #d7d8dc;
        --muted: #afb1b8;
        --line: #4a4c54;
        --btn-bg: #3d4048;
        --btn-bg-hover: #4a4d56;
        --surface: #34353a;
        --surface-soft: #34353a;
        --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        --reader-stage-bg: transparent;
        --paper-bg: #53545a;
        --paper-text: #d8d9dd;
        --paper-muted: #babcc2;
        --paper-line: #666872;
        --underline-color: #ffffff;
      }

      body[data-theme="light"] {
        --bg: #d7d7d8;
        --text: #1a1d24;
        --muted: #666b75;
        --line: #bfc1c7;
        --btn-bg: #e3e4e7;
        --btn-bg-hover: #ececee;
        --surface: #d7d7d8;
        --surface-soft: #d7d7d8;
        --shadow: 0 12px 34px rgba(39, 53, 88, 0.12);
        --reader-stage-bg: transparent;
        --paper-bg: #efefef;
        --paper-text: #1b1f26;
        --paper-muted: #646a76;
        --paper-line: #d8d8d8;
        --underline-color: #1f2937;
      }

      body {
        background: var(--bg);
        color: var(--text);
      }

      main {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: clamp(16px, 4vw, 34px);
      }

      .panel {
        width: min(1200px, 100%);
      }

      .screen {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: linear-gradient(155deg, var(--surface), var(--surface-soft));
        box-shadow: var(--shadow);
        padding: clamp(16px, 2.4vw, 24px);
      }

      .screen.list-screen,
      .screen.status-screen,
      .screen.error-screen {
        max-width: 760px;
        margin: 0 auto;
      }

      .screen.home-screen {
        max-width: 1160px;
        margin: 0 auto;
        border: none;
        background: transparent;
        box-shadow: none;
        padding: 0;
        min-height: calc(100vh - clamp(32px, 8vw, 68px));
        display: flex;
        flex-direction: column;
      }

      .screen.browse-screen,
      .screen.records-screen,
      .screen.quiz-screen,
      .screen.likert-screen,
      .screen.final-survey-screen,
      .screen.completed-screen {
        max-width: 1160px;
        margin: 0 auto;
        border: none;
        background: transparent;
        box-shadow: none;
        padding: 0;
        min-height: calc(100vh - clamp(32px, 8vw, 68px));
        display: flex;
        flex-direction: column;
      }

      .screen.reader-screen {
        border: none;
        background: transparent;
        box-shadow: none;
        padding: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .topbar-leading {
        min-height: 38px;
        display: flex;
        align-items: center;
      }

      .app-mark {
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--muted);
      }

      .theme-toggle {
        border: 1px solid var(--line);
        background: var(--btn-bg);
        color: var(--text);
        border-radius: 999px;
        height: 38px;
        min-width: 86px;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .theme-toggle:hover {
        background: var(--btn-bg-hover);
      }

      .theme-toggle__value {
        font-weight: 700;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(1.45rem, 2.1vw, 1.86rem);
      }

      .muted {
        color: var(--muted);
      }

      .file-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 22px;
        overflow: hidden;
        background: linear-gradient(155deg, var(--surface), var(--surface-soft));
        box-shadow: var(--shadow);
      }

      .file-list li + li {
        border-top: 1px solid var(--line);
      }

      .file-link {
        display: block;
        width: 100%;
        padding: 18px 22px;
        color: inherit;
        text-decoration: none;
        font-size: 1.02rem;
      }

      .file-link:hover {
        background: var(--btn-bg-hover);
      }

      .controls {
        border: none;
        padding: 0;
        margin-bottom: 18px;
      }

      .controls legend {
        font-weight: 600;
        padding: 0;
        margin-bottom: 12px;
        font-size: 1.04rem;
      }

      .radio-group {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 0;
      }

      .radio-item {
        position: relative;
      }

      .radio-item input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .radio-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        min-height: 74px;
        padding: 16px 18px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: linear-gradient(155deg, var(--surface), var(--surface-soft));
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease;
      }

      .radio-label:hover {
        transform: scale(1.01);
      }

      .radio-label__text {
        font-weight: 700;
      }

      .radio-label__check {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        border: 1px solid var(--line);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.95rem;
        color: transparent;
        background: transparent;
        flex: none;
      }

      .radio-item input:checked + .radio-label {
        border-color: rgba(132, 136, 146, 0.82);
      }

      .radio-item input:checked + .radio-label .radio-label__check {
        color: #ffffff;
        background: #6b707c;
        border-color: #6b707c;
      }

      .radio-item input:focus-visible + .radio-label {
        outline: 3px solid rgba(136, 140, 150, 0.38);
        outline-offset: 4px;
      }

      .browse-layout {
        flex: 1;
        display: flex;
        align-items: center;
      }

      .browse-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .browse-home-button {
        padding: 0;
        border: none;
        background: transparent;
        box-shadow: none;
        display: inline-flex;
        align-items: center;
        font-weight: 800;
        font-size: 1.15rem;
        letter-spacing: -0.02em;
        color: inherit;
        text-decoration: none;
        transform-origin: left center;
        transition: transform 180ms ease;
      }

      .browse-home-button:hover {
        background: transparent;
        transform: scale(1.05);
      }

      .browse-file-guide {
        margin: 0 0 8px;
        font-weight: 600;
        font-size: 1.04rem;
        color: var(--text);
      }

      .browse-section {
        display: grid;
        gap: 16px;
        width: min(960px, 100%);
        margin: 0 auto;
      }

      .records-layout {
        flex: 1;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: clamp(28px, 8vh, 72px) 0 28px;
      }

      .records-section {
        width: min(960px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      .records-summary {
        margin: 0;
        font-weight: 600;
        font-size: 1.04rem;
        color: var(--text);
        line-height: 1.7;
      }

      .records-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .records-toolbar .button,
      .record-actions .button {
        min-height: 46px;
        padding: 0 16px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .records-toolbar .button-primary {
        background: var(--btn-bg);
        border-color: var(--line);
        color: var(--text);
      }

      .records-toolbar .button-primary:hover {
        background: var(--btn-bg-hover);
      }

      .button {
        display: inline-block;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        background: var(--btn-bg);
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .button:hover {
        background: var(--btn-bg-hover);
      }

      .button-primary {
        background: #2f6fe5;
        border-color: #2f6fe5;
        color: #ffffff;
      }

      .button-primary:hover {
        background: #255dc4;
      }

      .start-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 14px;
      }

      .start-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }

      .start-card h2 {
        margin: 0 0 10px;
        font-size: 1.05rem;
      }

      .home-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        align-items: stretch;
        flex: 1;
        align-content: center;
      }

      .home-card {
        border: 1px solid var(--line);
        border-radius: 28px;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.07), transparent 45%),
          linear-gradient(155deg, var(--surface), var(--surface-soft));
        box-shadow: var(--shadow);
        min-height: clamp(280px, 30vw, 360px);
      }

      body[data-theme="light"] .home-card {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.8), transparent 42%),
          linear-gradient(155deg, #ececef, #d9dadf);
      }

      .home-card-action {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(26px, 4vw, 40px);
        text-align: center;
        text-decoration: none;
        color: inherit;
        transition: transform 180ms ease;
      }

      .home-card-action:hover {
        transform: scale(1.02);
        border-color: var(--line);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.07), transparent 45%),
          linear-gradient(155deg, var(--surface), var(--surface-soft));
      }

      .home-card-action:focus-visible {
        outline: 3px solid rgba(71, 121, 230, 0.75);
        outline-offset: 4px;
      }

      body[data-theme="light"] .home-card-action:hover {
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.8), transparent 42%),
          linear-gradient(155deg, #ececef, #d9dadf);
      }

      .home-card-title {
        display: block;
        font-size: clamp(2rem, 3vw, 2.9rem);
        font-weight: 800;
        line-height: 1.18;
        letter-spacing: -0.03em;
      }

      .home-card-study {
        padding: clamp(24px, 3.4vw, 34px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        transition: transform 180ms ease;
      }

      .home-card-study:hover {
        transform: scale(1.02);
      }

      .home-card-study h2 {
        margin: 0 0 10px;
        font-size: clamp(1.45rem, 2vw, 1.9rem);
      }

      .home-card-study .field-label {
        margin-top: 0;
      }

      .home-card-study .text-input {
        min-height: 50px;
        font-size: 1rem;
      }

      .home-card-study .group-buttons {
        gap: 10px;
        margin-top: 14px;
      }

      .home-card-study .group-buttons .button {
        width: 100%;
        min-height: 48px;
        font-weight: 700;
        transition: transform 180ms ease;
      }

      .home-card-study .group-buttons .button:hover {
        background: var(--btn-bg);
        border-color: var(--line);
        transform: scale(1.02);
      }

      .group-buttons {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }

      .start-actions {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .study-resume-box {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        margin: 12px 0;
      }

      .field-label {
        display: block;
        margin-top: 10px;
        margin-bottom: 6px;
        font-size: 0.95rem;
      }

      .text-input,
      .text-area,
      select.text-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--btn-bg);
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }

      .text-area {
        resize: vertical;
      }

      .text-input:focus,
      .text-input:focus-visible,
      .text-area:focus,
      .text-area:focus-visible,
      select.text-input:focus,
      select.text-input:focus-visible {
        outline: none;
        border-color: var(--line);
        box-shadow: none;
      }

      .study-meta {
        width: min(840px, 100%);
        margin: 0 auto 12px;
      }

      .study-next-wrap {
        width: min(840px, 100%);
        margin: 18px auto 0;
        display: flex;
        justify-content: flex-end;
      }

      .next-button {
        min-width: 96px;
        padding: 10px 16px;
        border-color: #5f6470;
        background: #5f6470;
        color: #f5f6f8;
        transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
      }

      .next-button:hover {
        background: #4f545f;
        border-color: #4f545f;
        transform: scale(1.03);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(219, 223, 231, 0.72);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 30;
        padding: 16px;
      }

      .modal-backdrop.hidden {
        display: none;
      }

      .modal-card {
        width: min(420px, 100%);
        min-height: min(360px, calc(100vh - 32px));
        border: 1px solid var(--line);
        border-radius: 24px;
        background: linear-gradient(155deg, var(--surface), var(--surface-soft));
        box-shadow: var(--shadow);
        padding: 28px;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        gap: 18px;
      }

      .modal-card h2 {
        margin: 0;
        font-size: clamp(1.45rem, 2vw, 1.8rem);
        letter-spacing: -0.03em;
      }

      .modal-card p {
        margin: 0;
        line-height: 1.7;
      }

      .modal-confirm {
        margin: 18px auto 0;
        min-height: 46px;
        padding: 0 24px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--btn-bg);
        color: var(--text);
        font: inherit;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform 180ms ease, background 180ms ease;
      }

      .modal-confirm:hover {
        background: var(--btn-bg-hover);
        transform: scale(1.04);
      }

      .tab-buttons {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .quiz-layout {
        flex: 1;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: clamp(28px, 8vh, 72px) 0 28px;
      }

      .quiz-shell {
        width: min(840px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      .quiz-page {
        border: 1px solid var(--line);
        border-radius: 26px;
        padding: clamp(22px, 3vw, 30px);
        background: linear-gradient(155deg, var(--surface), var(--surface-soft));
        box-shadow: var(--shadow);
        will-change: transform, opacity, filter;
        height: clamp(548px, 64vh, 640px);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .quiz-page-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .quiz-page-head {
        display: grid;
        gap: 12px;
        margin-bottom: 28px;
      }

      .quiz-page-kicker {
        margin: 0;
        color: var(--muted);
        font-size: 0.95rem;
        font-weight: 700;
      }

      .quiz-page-prompt {
        margin: 0;
        font-size: 1.12rem;
        line-height: 1.75;
      }

      .quiz-choice-list {
        display: grid;
        gap: 10px;
        flex: 1;
        align-content: center;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 14px 12px;
        margin: -14px -12px 0;
      }

      .quiz-choice {
        position: relative;
        padding: 2px 0;
      }

      .quiz-choice input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .quiz-choice-label {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        min-height: 74px;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: linear-gradient(155deg, var(--surface), var(--surface-soft));
        cursor: pointer;
        transform-origin: center;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .quiz-choice-label:hover {
        transform: scale(1.01);
      }

      .quiz-choice-id {
        width: 30px;
        height: 30px;
        border: 1px solid var(--line);
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        flex: none;
      }

      .quiz-choice-text {
        display: flex;
        align-items: center;
        min-height: 30px;
        line-height: 1.7;
      }

      .quiz-choice input:checked + .quiz-choice-label {
        border-color: rgba(132, 136, 146, 0.82);
        background: linear-gradient(155deg, var(--btn-bg-hover), var(--surface-soft));
      }

      .quiz-choice input:checked + .quiz-choice-label .quiz-choice-id {
        background: #6b707c;
        border-color: #6b707c;
        color: #ffffff;
      }

      .quiz-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        will-change: transform;
        min-height: 44px;
      }

      .quiz-progress-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: transparent;
        border: 1px solid var(--line);
        transform-origin: center;
        will-change: transform;
      }

      .quiz-progress-dot.is-answered {
        background: rgba(123, 128, 139, 0.35);
      }

      .quiz-progress-dot.is-current {
        width: 28px;
        background: #6b707c;
        border-color: #6b707c;
      }

      .quiz-progress-finish {
        width: 18px;
      }

      .quiz-nav {
        display: grid;
        grid-template-columns: minmax(74px, auto) 1fr minmax(74px, auto);
        align-items: center;
        gap: 12px;
      }

      .quiz-nav-button {
        min-height: 38px;
        padding: 0 12px;
        font-size: 0.95rem;
        justify-self: stretch;
      }

      .quiz-nav-spacer {
        min-height: 38px;
      }

      .quiz-page-footer {
        margin-top: 18px;
        display: flex;
        justify-content: flex-end;
      }

      .quiz-inline-button {
        border: none;
        background: transparent;
        padding: 0;
        font-weight: 700;
        transition: transform 180ms ease;
      }

      .quiz-inline-button:hover {
        background: transparent;
        transform: scale(1.03);
      }

      .quiz-complete-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 18px;
      }

      .quiz-complete-title {
        margin: 0;
        font-size: clamp(1.7rem, 2.4vw, 2.2rem);
        letter-spacing: -0.04em;
      }

      .quiz-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 10px;
      }

      .quiz-card h3 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .quiz-options {
        display: grid;
        gap: 8px;
      }

      .quiz-option {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }

      .quiz-option input {
        margin-top: 3px;
      }

      .likert-layout {
        flex: 1;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: clamp(28px, 8vh, 72px) 0 28px;
      }

      .likert-shell {
        width: min(780px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      .likert-page {
        border: 1px solid var(--line);
        border-radius: 26px;
        padding: clamp(24px, 3.2vw, 32px);
        background: linear-gradient(155deg, var(--surface), var(--surface-soft));
        box-shadow: var(--shadow);
        will-change: transform, opacity, filter;

        content: "";
        position: absolute;
        left: var(--likert-side);
        right: var(--likert-side);
        top: 50%;
        height: 8px;
        transform: translateY(-50%);
        border-radius: 999px;
        background: rgba(123, 128, 139, 0.18);
      }

      .likert-range-wrap::after {
        content: "";
        position: absolute;
        left: var(--likert-side);
        top: 50%;
        height: 8px;
        width: calc((100% - (var(--likert-side) * 2)) * (var(--likert-progress) / 100));
        transform: translateY(-50%);
        border-radius: 999px;
        background: #6b707c;

      .likert-scale-labels span:nth-child(1) {
        left: var(--likert-side);
        transform: translateX(0);
        text-align: left;
      }

      .likert-scale-labels span:nth-child(2) {
        left: calc(var(--likert-side) + ((100% - (var(--likert-side) * 2)) * 0.25));
      }

      .likert-scale-labels span:nth-child(3) {
        left: calc(var(--likert-side) + ((100% - (var(--likert-side) * 2)) * 0.5));
      }

      .likert-scale-labels span:nth-child(4) {
        left: calc(var(--likert-side) + ((100% - (var(--likert-side) * 2)) * 0.75));
      }

      .likert-scale-labels span:nth-child(5) {
        left: auto;
        right: var(--likert-side);
        transform: translateX(0);
        text-align: right;

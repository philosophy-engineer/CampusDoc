<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TXT Viewer</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #34353a;
        --text: #d7d8dc;
        --muted: #afb1b8;
        --line: #4a4c54;
        --btn-bg: #3d4048;
        --btn-bg-hover: #4a4d56;
        --surface: #34353a;
        --surface-soft: #34353a;
        --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        --reader-stage-bg: transparent;
        --paper-bg: #53545a;
        --paper-text: #d8d9dd;
        --paper-muted: #babcc2;
        --paper-line: #666872;
        --underline-color: #1b1f27;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        font-family: "SUIT Variable", "Pretendard Variable", "Noto Sans KR", -apple-system, sans-serif;
        transition: background-color 180ms ease, color 180ms ease;
      }

      body[data-theme="dark"] {
        --bg: #34353a;
        --text: #d7d8dc;
        --muted: #afb1b8;
        --line: #4a4c54;
        --btn-bg: #3d4048;
        --btn-bg-hover: #4a4d56;
        --surface: #34353a;
        --surface-soft: #34353a;
        --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        --reader-stage-bg: transparent;
        --paper-bg: #53545a;
        --paper-text: #d8d9dd;
        --paper-muted: #babcc2;
        --paper-line: #666872;
        --underline-color: #ffffff;
      }

      body[data-theme="light"] {
        --bg: #d7d7d8;
        --text: #1a1d24;
        --muted: #666b75;
        --line: #bfc1c7;
        --btn-bg: #e3e4e7;
        --btn-bg-hover: #ececee;
        --surface: #d7d7d8;
        --surface-soft: #d7d7d8;
        --shadow: 0 12px 34px rgba(39, 53, 88, 0.12);
        --reader-stage-bg: transparent;
        --paper-bg: #efefef;
        --paper-text: #1b1f26;
        --paper-muted: #646a76;
        --paper-line: #d8d8d8;
        --underline-color: #1f2937;
      }

      body {
        background: var(--bg);
        color: var(--text);
      }

      main {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: clamp(16px, 4vw, 34px);
      }

      .panel {
        width: min(1060px, 100%);
      }

      .screen {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: linear-gradient(155deg, var(--surface), var(--surface-soft));
        box-shadow: var(--shadow);
        padding: clamp(16px, 2.4vw, 24px);
      }

      .screen.list-screen,
      .screen.status-screen,
      .screen.error-screen {
        max-width: 760px;
        margin: 0 auto;
      }

      .screen.reader-screen {
        border: none;
        background: transparent;
        box-shadow: none;
        padding: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .topbar-leading {
        min-height: 38px;
        display: flex;
        align-items: center;
      }

      .app-mark {
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--muted);
      }

      .theme-toggle {
        border: 1px solid var(--line);
        background: var(--btn-bg);
        color: var(--text);
        border-radius: 999px;
        height: 38px;
        min-width: 86px;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 0.9rem;
      }

      .theme-toggle:hover {
        background: var(--btn-bg-hover);
      }

      .theme-toggle__value {
        font-weight: 700;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(1.45rem, 2.1vw, 1.86rem);
      }

      .muted {
        color: var(--muted);
      }

      .file-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .file-list li + li {
        border-top: 1px solid var(--line);
      }

      .file-link {
        display: block;
        width: 100%;
        padding: 14px 16px;
        color: inherit;
        text-decoration: none;
      }

      .file-link:hover {
        background: var(--btn-bg-hover);
      }

      .controls {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 14px;
      }

      .controls legend {
        font-weight: 600;
        padding: 0 4px;
      }

      .radio-group {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
        margin-top: 8px;
      }

      .radio-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .actions {
        margin-bottom: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-block;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        background: var(--btn-bg);
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .button:hover {
        background: var(--btn-bg-hover);
      }

      .badge {
        display: inline-block;
        border: 1px solid rgba(75, 131, 232, 0.35);
        background: rgba(78, 132, 235, 0.15);
        color: #2356b8;
        border-radius: 999px;
        font-size: 0.82rem;
        padding: 4px 12px;
      }

      body[data-theme="dark"] .badge {
        background: rgba(113, 157, 255, 0.2);
        color: #b5ceff;
        border-color: rgba(150, 183, 255, 0.34);
      }

      .reader-stage {
        background: transparent;
        border-radius: 0;
        padding: 0;
        box-shadow: none;
      }

      .reader-paper {
        background: var(--paper-bg);
        color: var(--paper-text);
        border: 1px solid var(--paper-line);
        border-radius: 0;
        overflow: hidden;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
        width: min(840px, 100%);
        margin: 0 auto;
      }

      .reader-paper-head {
        padding: clamp(20px, 3.6vw, 34px) clamp(18px, 3.4vw, 40px) 14px;
      }

      .reader-paper-head h1 {
        color: var(--paper-text);
        margin-top: 14px;
        margin-bottom: 8px;
      }

      .reader-hint {
        margin: 0;
        color: var(--paper-muted);
      }

      .reader-frame {
        border-top: 1px solid var(--paper-line);
      }

      .reader-scroll {
        position: relative;
        max-height: none;
        overflow: visible;
        padding: clamp(16px, 3.2vw, 36px) clamp(18px, 3.4vw, 40px);
        line-height: 1.78;
        font-size: clamp(16px, 1.15vw, 18px);
        cursor: default;
      }

      .reader-text {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--paper-text);
        font-family: "SUIT Variable", "Pretendard Variable", "Noto Sans KR", -apple-system, sans-serif;
        position: relative;
        z-index: 2;
        cursor: default;
      }

      .reader-scroll:focus,
      .reader-scroll:focus-visible {
        outline: none;
      }

      .line-overlay {
        position: absolute;
        left: 0;
        width: 0;
        z-index: 1;
        pointer-events: none;
        border-radius: 6px;
        display: none;
      }

      .line-overlay.mode-b {
        background: transparent;
        border-bottom: 2px solid var(--underline-color);
        border-radius: 0;
      }

      .line-overlay.mode-c,
      .line-overlay.mode-d {
        background: rgba(37, 99, 235, 0.14);
      }

      @media (max-width: 720px) {
        main {
          padding: 12px;
        }

        .screen {
          padding: 12px;
        }

        .topbar {
          margin-bottom: 12px;
        }

        .theme-toggle {
          min-width: 80px;
          padding: 0 10px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="app" class="panel" aria-live="polite"></div>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>

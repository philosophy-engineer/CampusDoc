<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TXT Viewer</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --btn-bg: #f9fafb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(680px, 100%);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 1.5rem;
      }

      .muted {
        color: var(--muted);
      }

      .file-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .file-list li + li {
        border-top: 1px solid var(--line);
      }

      .file-link {
        display: block;
        width: 100%;
        padding: 14px 16px;
        color: inherit;
        text-decoration: none;
      }

      .file-link:hover {
        background: #f3f4f6;
      }

      .actions {
        margin-bottom: 12px;
      }

      .button {
        display: inline-block;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        background: var(--btn-bg);
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .content {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="app" class="panel" aria-live="polite"></div>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TXT Viewer</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --btn-bg: #f9fafb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(680px, 100%);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 1.5rem;
      }

      .muted {
        color: var(--muted);
      }

      .file-list {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .file-list li + li {
        border-top: 1px solid var(--line);
      }

      .file-link {
        display: block;
        width: 100%;
        padding: 14px 16px;
        color: inherit;
        text-decoration: none;
      }

      .file-link:hover {
        background: #f3f4f6;
      }

      .controls {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 14px;
      }

      .controls legend {
        font-weight: 600;
        padding: 0 4px;
      }

      .radio-group {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
        margin-top: 8px;
      }

      .radio-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .actions {
        margin-bottom: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .button {
        display: inline-block;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        background: var(--btn-bg);
        color: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .badge {
        display: inline-block;
        margin-bottom: 10px;
        border: 1px solid #bfdbfe;
        background: #eff6ff;
        color: #1d4ed8;
        border-radius: 999px;
        font-size: 0.82rem;
        padding: 4px 10px;
      }

      .reader-frame {
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .reader-scroll {
        position: relative;
        max-height: min(72vh, 760px);
        overflow: auto;
        padding: 16px;
        line-height: 1.65;
        font-size: 16px;
      }

      .reader-scroll.mode-d {
        overflow: hidden;
      }

      .reader-text {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        position: relative;
        z-index: 2;
      }

      .line-overlay {
        position: absolute;
        left: 0;
        width: 0;
        z-index: 1;
        pointer-events: none;
        border-radius: 6px;
        display: none;
      }

      .line-overlay.mode-b {
        background: transparent;
        border-bottom: 2px solid #000000;
        border-radius: 0;
      }

      .line-overlay.mode-c,
      .line-overlay.mode-d {
        background: rgba(37, 99, 235, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <div id="app" class="panel" aria-live="polite"></div>
    </main>
    <script src="./app.js" defer></script>
  </body>
</html>
